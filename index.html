<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            text-align: center;
            margin-top: 80px;
            background: linear-gradient(135deg, #ffe6f0, #e6f0ff);
        }

        h1 {
            color: #ff4fa3;
        }

        input {
            padding: 10px;
            font-size: 18px;
            width: 150px;
            border-radius: 15px;
            border: 2px solid #ffb6d9;
        }

        button {
            padding: 10px 18px;
            font-size: 16px;
            margin: 8px;
            border: none;
            background: #ff4fa3;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #e63b8c;
        }
    </style>
</head>
<body>

<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" width="120">

<h1>Guess the Number (1-100)</h1>

<input type="number" id="guessInput" placeholder="Enter your guess">
<button onclick="checkGuess()">Submit Guess</button>

<p id="message"></p>
<p id="attempts"></p>
<button onclick="resetGame()">Play Again</button>

<script>
    let randomNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    function checkGuess() {
        let userGuess = document.getElementById("guessInput").value;
        attempts++;

        if (userGuess == randomNumber) {
            document.getElementById("message").innerText = "🎉 You Win Buddy!";
            document.getElementById("guessInput").disabled = true;
        } else if (userGuess > randomNumber) {
            document.getElementById("message").innerText = "Too high!";
        } else {
            document.getElementById("message").innerText = "Too low!";
        }

        document.getElementById("attempts").innerText = "Attempts: " + attempts;
    }        
 function resetGame() {
    randomNumber = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
    document.getElementById("message").innerText = "";
    document.getElementById("attempts").innerText = "";
    document.getElementById("guessInput").value = "";
    document.getElementById("guessInput").disabled = false;
 }
</script>

</body>
</html>
