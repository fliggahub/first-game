<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            text-align: center;
            margin-top: 80px;
            background: linear-gradient(135deg, #ffe6f0, #e6f0ff);
        }

        h1 { color: #ff4fa3; }

        input {
            padding: 10px;
            font-size: 18px;
            width: 160px;
            border-radius: 15px;
            border: 2px solid #ffb6d9;
        }

        button {
            padding: 10px 18px;
            font-size: 16px;
            margin: 8px;
            border: none;
            background: #ff4fa3;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }

        button:hover { background: #e63b8c; }

        #message { font-size: 20px; margin-top: 15px; }
    </style>
</head>

<body>

<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" width="120">

<h1>Guess the Number (1–100)</h1>

<input type="number" id="guessInput" placeholder="Enter your guess">
<br>
<button id="submitBtn">Submit Guess</button>
<button id="resetBtn">Play Again</button>

<p id="message"></p>
<p id="attempts"></p>

<script>
let randomNumber = Math.floor(Math.random() * 100) + 1;
let attempts = 0;

const guessInput = document.getElementById("guessInput");
const message = document.getElementById("message");
const attemptsText = document.getElementById("attempts");
const submitBtn = document.getElementById("submitBtn");
const resetBtn = document.getElementById("resetBtn");

submitBtn.addEventListener("click", checkGuess);
resetBtn.addEventListener("click", resetGame);

function checkGuess() {
    let guess = Number(guessInput.value);

    if (!guess || guess < 1 || guess > 100) {
        message.innerText = "Enter a number between 1 and 100";
        return;
    }

    attempts++;

    if (guess === randomNumber) {
        message.innerText = "🎉 You win!";
        guessInput.disabled = true;
        submitBtn.disabled = true;
    }
    else if (guess > randomNumber) {
        message.innerText = "Too high!";
    }
    else {
        message.innerText = "Too low!";
    }

    attemptsText.innerText = "Attempts: " + attempts;
}

function resetGame() {
    randomNumber = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
    message.innerText = "";
    attemptsText.innerText = "";
    guessInput.value = "";
    guessInput.disabled = false;
    submitBtn.disabled = false;
}
</script>

</body>
</html>
