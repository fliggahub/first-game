<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bhalu Guessing Game</title>

  <!-- Cute font -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Fredoka', sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px 16px 60px;
      background: linear-gradient(135deg, #ffe6f0, #e6f0ff);
    }

    .card {
      max-width: 520px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 22px;
      padding: 26px 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 12px;
      color: #ff4fa3;
      font-size: 30px;
    }

    .subtitle {
      margin: 0 0 18px;
      opacity: 0.75;
    }

    .row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    input {
      padding: 10px 12px;
      font-size: 18px;
      width: 170px;
      border-radius: 15px;
      border: 2px solid #ffb6d9;
      outline: none;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      background: #ff4fa3;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #e63b8c;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #message {
      font-size: 20px;
      margin: 14px 0 6px;
      min-height: 26px;
    }

    #attempts {
      margin: 0;
      opacity: 0.85;
      min-height: 22px;
    }

    .support-section {
      margin-top: 18px;
      padding: 18px;
      background: rgba(255,255,255,0.6);
      border-radius: 18px;
    }

    .support-title {
      margin: 0 0 8px;
      color: #ff4fa3;
      font-size: 20px;
    }

    .support-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 18px;
      background: #ff4fa3;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
    }

    .support-btn:hover {
      background: #e63b8c;
    }

    .tiny {
      margin: 10px 0 0;
      font-size: 14px;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🐻 Bhalu Guess the Number</h1>
    <p class="subtitle">Pick a number from <b>1</b> to <b>100</b> and see if you can win.</p>

    <div class="row">
      <input type="number" id="guessInput" placeholder="Enter guess" min="1" max="100" />
      <button id="submitBtn">Submit</button>
      <button id="resetBtn">Play Again</button>
    </div>

    <p id="message"></p>
    <p id="attempts"></p>

    <div class="support-section">
      <p class="support-title">💖 Enjoying the game?</p>
      <p>If this made you smile, support future updates!</p>

      <a class="support-btn" href="https://buymeacoffee.com/bhalu" target="_blank" rel="noopener noreferrer">
        ☕ Support the Developer
      </a>

      <p class="tiny">Planned updates: hard mode, score tracking, and more mini-games.</p>
    </div>
  </div>

  <script>
    let randomNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    const guessInput = document.getElementById("guessInput");
    const messageEl = document.getElementById("message");
    const attemptsEl = document.getElementById("attempts");
    const submitBtn = document.getElementById("submitBtn");
    const resetBtn = document.getElementById("resetBtn");

    function setMessage(text) {
      messageEl.innerText = text;
    }

    function updateAttempts() {
      attemptsEl.innerText = attempts > 0 ? ("Attempts: " + attempts) : "";
    }

    function checkGuess() {
      const guess = Number(guessInput.value);

      // Validate
      if (!guess || guess < 1 || guess > 100) {
        setMessage("Type a number from 1 to 100 🙂");
        return;
      }

      attempts++;
      updateAttempts();

      if (guess === randomNumber) {
        setMessage(`🎉 You win! The number was ${randomNumber}.`);
        guessInput.disabled = true;
        submitBtn.disabled = true;
      } else if (guess > randomNumber) {
        setMessage("Too high!");
      } else {
        setMessage("Too low!");
      }
    }

    function resetGame() {
      randomNumber = Math.floor(Math.random() * 100) + 1;
      attempts = 0;
      guessInput.value = "";
      guessInput.disabled = false;
      submitBtn.disabled = false;
      setMessage("");
      updateAttempts();
      guessInput.focus();
    }

    // Wire up buttons
    submitBtn.addEventListener("click", checkGuess);
    resetBtn.addEventListener("click", resetGame);

    // Enter key submits
    guessInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkGuess();
    });

    // Initial state
    resetGame();
  </script>
</body>
</html>
